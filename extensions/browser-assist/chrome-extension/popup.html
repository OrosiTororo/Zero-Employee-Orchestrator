<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a2e;
      margin: 0;
    }
    h2 {
      font-size: 15px;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 4px;
    }
    label {
      display: block;
      font-weight: 500;
      margin: 10px 0 4px;
      font-size: 12px;
      color: #475569;
    }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #667eea;
    }
    select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      background: white;
    }
    .status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status.connected {
      background: #dcfce7;
      color: #166534;
    }
    .status.disconnected {
      background: #fee2e2;
      color: #991b1b;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.on { background: #22c55e; }
    .dot.off { background: #ef4444; }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    .save-msg {
      text-align: center;
      color: #22c55e;
      font-size: 11px;
      margin-top: 6px;
      display: none;
    }
    hr { border: none; border-top: 1px solid #e5e7eb; margin: 14px 0; }
  </style>
</head>
<body>
  <h2><div class="logo"></div> Zero-Employee Assist</h2>

  <div class="status disconnected" id="status">
    <span class="dot off" id="statusDot"></span>
    <span id="statusLabel">Disconnected</span>
  </div>

  <hr>

  <label>Server URL (WebSocket)</label>
  <input type="text" id="serverUrl" value="ws://localhost:18234/ws/browser-assist">

  <label>API Base URL</label>
  <input type="text" id="apiBaseUrl" value="http://localhost:18234/api/v1">

  <label>User ID</label>
  <input type="text" id="userId" value="extension_user">

  <label>Language</label>
  <select id="language">
    <option value="ja">日本語</option>
    <option value="en">English</option>
    <option value="zh">中文</option>
  </select>

  <button id="saveBtn">Save Settings</button>
  <div class="save-msg" id="saveMsg">Settings saved!</div>

  <button id="connectBtn" style="background:#22c55e">Connect</button>

  <script src="popup.js"></script>
</body>
</html>
