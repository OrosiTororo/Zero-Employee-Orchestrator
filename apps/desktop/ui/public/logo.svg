    <rect x="148" y="168" width="80" height="48" rx="8"/>
    <!-- Connections -->
    <line x1="108" y1="88" x2="68" y2="168"/>
    <line x1="148" y1="88" x2="188" y2="168"/>
  </g>
</svg>
