# Zero-Employee Orchestrator — Docker Compose
# Start all services without root privileges
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose up api         # Start API only
#   docker compose logs -f api    # View logs
#
# Production:
#   docker compose --profile production up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18234:18234"
    environment:
      - DEBUG=${DEBUG:-false}
      - DATABASE_URL=sqlite+aiosqlite:///./data/zero_employee_orchestrator.db
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set. Generate with: python -c "import secrets; print(secrets.token_urlsafe(32))"}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - LANGUAGE=${LANGUAGE:-en}
    volumes:
      - app-data:/app/data
      - rag-store:/app/.zero_employee
    user: "1000:1000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18234/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    networks:
      - zeo-internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=100M

  # Cloudflare Workers Edge (optional)
  edge:
    build:
      context: ./apps/edge/full
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set for edge worker}
      - API_BACKEND_URL=http://api:18234
    user: "1000:1000"
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - edge
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - zeo-internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

networks:
  zeo-internal:
    driver: bridge
    internal: false

volumes:
  app-data:
  rag-store:
