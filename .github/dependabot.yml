version: 2
updates:
  # Python dependencies (FastAPI backend)
  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # Node.js dependencies (pnpm workspace root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # Node.js dependencies (desktop shell – Tauri CLI)
  - package-ecosystem: "npm"
    directory: "/apps/desktop"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # Node.js dependencies (desktop UI – React/Vite)
  - package-ecosystem: "npm"
    directory: "/apps/desktop/ui"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # Node.js dependencies (edge full – Cloudflare Workers)
  - package-ecosystem: "npm"
    directory: "/apps/edge/full"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # Node.js dependencies (edge proxy – Cloudflare Workers)
  - package-ecosystem: "npm"
    directory: "/apps/edge/proxy"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # Rust dependencies (Tauri backend)
  - package-ecosystem: "cargo"
    directory: "/apps/desktop/src-tauri"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"