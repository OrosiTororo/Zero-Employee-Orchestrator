version: 2
updates:
  # Python dependencies (FastAPI backend)
  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      python-deps:
        patterns:
          - "*"

  # Node.js dependencies (pnpm workspace – desktop shell + desktop UI)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      pnpm-workspace:
        patterns:
          - "*"

  # Node.js dependencies (edge full – Cloudflare Workers)
  - package-ecosystem: "npm"
    directory: "/apps/edge/full"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      edge-full:
        patterns:
          - "*"

  # Node.js dependencies (edge proxy – Cloudflare Workers)
  - package-ecosystem: "npm"
    directory: "/apps/edge/proxy"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      edge-proxy:
        patterns:
          - "*"

  # Rust dependencies (Tauri backend)
  - package-ecosystem: "cargo"
    directory: "/apps/desktop/src-tauri"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      rust-deps:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      actions:
        patterns:
          - "*"
