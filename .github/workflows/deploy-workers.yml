name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Deploy mode"
        required: true
        type: choice
        options:
          - proxy
          - full
          - pages

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=()
          if [ -z "$CF_API_TOKEN" ]; then
            missing+=("CLOUDFLARE_API_TOKEN")
          fi
          if [ -z "$CF_ACCOUNT_ID" ]; then
            missing+=("CLOUDFLARE_ACCOUNT_ID")
          fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Required secrets are not configured: ${missing[*]}. Add them in Settings > Secrets and variables > Actions. See https://developers.cloudflare.com/fundamentals/api/get-started/create-token/"
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---------- Proxy mode ----------
      - name: Install dependencies (proxy)
        if: inputs.mode == 'proxy'
        working-directory: apps/edge/proxy
        run: npm ci

      - name: Deploy Workers Proxy
        if: inputs.mode == 'proxy'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/edge/proxy
          command: deploy

      # ---------- Full mode ----------
      - name: Install dependencies (full)
        if: inputs.mode == 'full'
        working-directory: apps/edge/full
        run: npm ci

      - name: Deploy Full Workers
        if: inputs.mode == 'full'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/edge/full
          command: deploy

      # ---------- Pages mode ----------
      - name: Setup pnpm
        if: inputs.mode == 'pages'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (pages)
        if: inputs.mode == 'pages'
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        if: inputs.mode == 'pages'
        working-directory: apps/desktop/ui
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        if: inputs.mode == 'pages'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/desktop/ui
          command: pages deploy dist --project-name=zeo-ui
