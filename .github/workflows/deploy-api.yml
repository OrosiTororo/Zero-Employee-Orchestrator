name: Deploy API Server

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        type: choice
        options:
          - docker-self-hosted
          - fly-io
          - railway
      image_tag:
        description: "Docker image tag (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/zero-employee-api

jobs:
  # ──────────────────────────────────────────────────────────────
  # 共通: Docker イメージのビルド & プッシュ
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Validate required secrets
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          missing=()
          if [ -z "$SECRET_KEY" ]; then
            missing+=("SECRET_KEY")
          fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Required secrets are not configured: ${missing[*]}. Add them in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # 選択肢 A: Docker (VPS / セルフホスト)
  # ──────────────────────────────────────────────────────────────
  deploy-docker:
    name: Deploy to Docker Host (VPS)
    needs: build-and-push
    if: inputs.target == 'docker-self-hosted'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate SSH secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=()
          [ -z "$DEPLOY_HOST" ] && missing+=("DEPLOY_HOST")
          [ -z "$DEPLOY_USER" ] && missing+=("DEPLOY_USER")
          [ -z "$DEPLOY_SSH_KEY" ] && missing+=("DEPLOY_SSH_KEY")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Required secrets: ${missing[*]}. See docs/deployment.md"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}"
            CONTAINER_NAME="zero-employee-api"

            echo "Pulling image: $IMAGE"
            docker pull "$IMAGE"

            echo "Stopping existing container (if any)"
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true

            echo "Starting new container"
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 18234:18234 \
              --user 1000:1000 \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
              -e DEBUG=false \
              -e CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}" \
              -v zeo-data:/app/data \
              -v zeo-rag:/app/.zero_employee \
              --health-cmd "curl -f http://localhost:18234/healthz || exit 1" \
              --health-interval 30s \
              --health-timeout 5s \
              --health-retries 3 \
              "$IMAGE"

            echo "Waiting for health check..."
            for i in $(seq 1 10); do
              if docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_NAME" 2>/dev/null | grep -q healthy; then
                echo "Container is healthy"
                exit 0
              fi
              sleep 5
            done

            echo "::warning::Container did not become healthy within 50s. Check logs:"
            docker logs --tail 20 "$CONTAINER_NAME"

  # ──────────────────────────────────────────────────────────────
  # 選択肢 B: Fly.io (PaaS)
  # ──────────────────────────────────────────────────────────────
  deploy-fly:
    name: Deploy to Fly.io
    needs: build-and-push
    if: inputs.target == 'fly-io'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not set."
            exit 1
          fi
          flyctl deploy \
            --image "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}"

      - name: Set secrets on Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl secrets set \
            SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}" \
            DEBUG=false \
            --stage

  # ──────────────────────────────────────────────────────────────
  # 選択肢 C: Railway (PaaS)
  # ──────────────────────────────────────────────────────────────
  deploy-railway:
    name: Deploy to Railway
    needs: build-and-push
    if: inputs.target == 'railway'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set."
            exit 1
          fi
          railway up --detach

  # ──────────────────────────────────────────────────────────────
  # セキュリティチェック (全ターゲット共通・デプロイ後)
  # ──────────────────────────────────────────────────────────────
  post-deploy-check:
    name: Post-Deploy Security Check
    needs: [deploy-docker, deploy-fly, deploy-railway]
    if: always() && (needs.deploy-docker.result == 'success' || needs.deploy-fly.result == 'success' || needs.deploy-railway.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run security check script
        run: |
          chmod +x scripts/security-check.sh
          ./scripts/security-check.sh
