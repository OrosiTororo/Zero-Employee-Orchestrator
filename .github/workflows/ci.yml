name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-metadata-sync:
    name: Check pyproject.toml Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify pyproject.toml metadata sync
        run: |
          set -euo pipefail

          ROOT="pyproject.toml"
          API="apps/api/pyproject.toml"

          extract() {
            grep -m1 "^$2 = " "$1" | sed "s/$2 = //" | tr -d '"'
          }

          FAIL=0

          # Fields that must be identical between both files
          for field in version name description requires-python license; do
            root_val=$(extract "$ROOT" "$field")
            api_val=$(extract "$API" "$field")
            if [ "$root_val" != "$api_val" ]; then
              echo "::error::$field mismatch — root: '$root_val' vs apps/api: '$api_val'"
              FAIL=1
            else
              echo "✅ $field: $root_val"
            fi
          done

          # Check that dependencies lists match (compare sorted)
          root_deps=$(sed -n '/^dependencies = \[/,/^\]/p' "$ROOT" | grep '"' | sort)
          api_deps=$(sed -n '/^dependencies = \[/,/^\]/p' "$API" | grep '"' | sort)
          if [ "$root_deps" != "$api_deps" ]; then
            echo "::error::dependencies mismatch between root and apps/api pyproject.toml"
            diff <(echo "$root_deps") <(echo "$api_deps") || true
            FAIL=1
          else
            echo "✅ dependencies: match"
          fi

          # Check that dev dependencies match
          root_dev=$(sed -n '/^dev = \[/,/^\]/p' "$ROOT" | grep '"' | sort)
          api_dev=$(sed -n '/^dev = \[/,/^\]/p' "$API" | grep '"' | sort)
          if [ "$root_dev" != "$api_dev" ]; then
            echo "::error::dev dependencies mismatch between root and apps/api pyproject.toml"
            diff <(echo "$root_dev") <(echo "$api_dev") || true
            FAIL=1
          else
            echo "✅ dev dependencies: match"
          fi

          # Check that ruff lint select rules match
          root_select=$(grep -A1 '^\[tool.ruff.lint\]' "$ROOT" | grep '^select' | sed 's/select = //')
          api_select=$(grep -A1 '^\[tool.ruff.lint\]' "$API" | grep '^select' | sed 's/select = //')
          if [ "$root_select" != "$api_select" ]; then
            echo "::error::ruff lint select mismatch — root: '$root_select' vs apps/api: '$api_select'"
            FAIL=1
          else
            echo "✅ ruff lint select: match"
          fi

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "❌ pyproject.toml metadata is out of sync."
            echo "   Use ./scripts/bump-version.sh to update versions."
            echo "   Update other metadata manually in both files."
            exit 1
          fi

          echo ""
          echo "✅ All metadata is in sync."

  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio httpx pytest-cov pip-audit
          pip install -e .

      - name: Lint with ruff
        run: ruff check app/

      - name: Format check with ruff
        run: ruff format --check app/

      - name: Run tests with coverage
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          pytest app/tests/ -v --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml
          echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
          pytest app/tests/ --cov=app --cov-report=term 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: apps/api/coverage.xml

      - name: Dependency security audit
        run: pip-audit --desc --skip-editable --ignore-vuln CVE-2026-4539

      - name: Verify Alembic migrations
        run: |
          pip install alembic aiosqlite
          cd $GITHUB_WORKSPACE/apps/api
          python -c "
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from app.core.database import Base
          import app.models  # noqa: F401
          async def check():
              engine = create_async_engine('sqlite+aiosqlite://')
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)
              await engine.dispose()
              print('✅ All models create tables successfully')
          asyncio.run(check())
          "

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t zeo-test:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: zeo-test:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore

  redteam-tests:
    name: Red-team Security Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Run red-team tests
        run: |
          python -c "
          import asyncio
          from app.security.redteam import redteam_service

          async def run():
              report = await redteam_service.run_all_tests()
              print(f'Total: {report.total_tests}')
              print(f'Passed: {report.passed}')
              print(f'Failed: {report.failed}')
              print(f'Critical: {report.critical_findings}')
              print(f'High: {report.high_findings}')
              for r in report.results:
                  status = 'PASS' if r.passed else 'FAIL'
                  print(f'  [{status}] {r.test_id}: {r.actual_behavior}')
              if report.critical_findings > 0:
                  print(f'::error::Red-team found {report.critical_findings} critical vulnerabilities')
                  exit(1)
              if report.failed > report.total_tests * 0.2:
                  print(f'::warning::Red-team failure rate > 20%: {report.failed}/{report.total_tests}')

          asyncio.run(run())
          "

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: apps/desktop/ui
        run: pnpm tsc --noEmit

      - name: Run frontend tests
        working-directory: apps/desktop/ui
        run: pnpm test

      - name: Build
        working-directory: apps/desktop/ui
        run: pnpm build
