name: Release - Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # Build Tauri desktop app for all platforms
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - platform: ubuntu-24.04
            target: linux
            rust_target: ''
            wix_language: ''
          # macOS — Apple Silicon (M1/M2/M3)
          - platform: macos-latest
            target: macos
            rust_target: aarch64-apple-darwin
            wix_language: ''
          # Windows — en-US MSI + NSIS exe
          - platform: windows-latest
            target: windows
            rust_target: ''
            wix_language: '["en-US"]'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target for Apple Silicon
        if: matrix.target == 'macos'
        run: |
          rustup target add aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set WiX language for locale-specific MSI
        if: matrix.wix_language != ''
        shell: pwsh
        run: |
          $conf = Get-Content apps/desktop/src-tauri/tauri.conf.json | ConvertFrom-Json
          if (-not $conf.bundle.windows) {
            $conf.bundle | Add-Member -NotePropertyName windows -NotePropertyValue @{}
          }
          if (-not $conf.bundle.windows.wix) {
            $conf.bundle.windows | Add-Member -NotePropertyName wix -NotePropertyValue @{}
          }
          $lang = '${{ matrix.wix_language }}' | ConvertFrom-Json
          $conf.bundle.windows.wix | Add-Member -NotePropertyName language -NotePropertyValue $lang -Force
          $conf | ConvertTo-Json -Depth 10 | Set-Content apps/desktop/src-tauri/tauri.conf.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: npx tauri
          args: ${{ matrix.rust_target != '' && format('--target {0}', matrix.rust_target) || '' }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          releaseName: "Zero-Employee Orchestrator ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}"
          releaseBody: |
            ## Zero-Employee Orchestrator ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}

            AI業務オーケストレーション基盤 / AI Business Orchestration Platform / AI业务编排平台

            自然言語で業務を定義し、複数 AI を役割分担させ、人間の承認と監査可能性を前提に業務を実行するプラットフォーム。

            ---

            ### 📥 ダウンロード / Download / 下载

            下の **Assets** からお使いの OS に合ったファイルを **1 つだけ** ダウンロードしてください。
            Click **one file** matching your OS from **Assets** below.
            请从下方 **Assets** 中下载与您操作系统匹配的 **1 个文件**。

            | OS | ファイル / File | 説明 / Description | おすすめ / Recommended |
            |---|---|---|:---:|
            | **Windows** | `Zero-Employee.Orchestrator_x64_en-US.msi` | Windows インストーラー (.msi)。ダブルクリックで実行 / Windows installer (.msi). Double-click to run | ⭐ |
            | **Windows** | `Zero-Employee.Orchestrator_x64-setup.exe` | Windows インストーラー (.exe / NSIS)。.msi が動かない場合に使用 / Use if .msi doesn't work | |
            | **macOS** | `Zero-Employee.Orchestrator_aarch64.dmg` | macOS (Apple Silicon M1/M2/M3)。開いて Applications にドラッグ / Open and drag to Applications | ⭐ |
            | **Linux** | `Zero-Employee.Orchestrator_amd64.AppImage` | そのまま実行可能（インストール不要）/ Runs directly (no install needed) | ⭐ |
            | **Linux** | `Zero-Employee.Orchestrator_amd64.deb` | Debian / Ubuntu 用パッケージ / Debian / Ubuntu package | |
            | **Linux** | `Zero-Employee.Orchestrator-x86_64.rpm` | Fedora / RHEL 用パッケージ / Fedora / RHEL package | |

            ### 🚫 ダウンロード不要なファイル / Files You Do NOT Need to Download

            以下のファイルはアプリの自動更新機能が内部的に使うものです。手動ダウンロードは不要です。
            These files are used internally by the app's auto-update system. No manual download required.

            | ファイル / File | 用途 / Purpose |
            |---|---|
            | `*.sig` ファイル（6 個 / 6 files） | 自動更新時の署名検証用 / Signature verification for auto-updates |
            | `latest.json` | 新しいバージョンの有無を確認するメタデータ / Metadata for checking new versions |
            | `*_aarch64.app.tar.gz` | macOS 自動更新用アーカイブ / macOS auto-update archive |

            > **まとめ / Summary**: Assets に 14 個のファイルがありますが、**あなたがダウンロードするのは OS に合った 1 つだけ**です。
            > There are 14 files in Assets, but **you only need to download one** that matches your OS.

            ---

            ### 主な機能 / Key Features

            - 9層アーキテクチャ（Design Interview〜Skill Registry）
            - Self-Healing DAG によるタスクオーケストレーション
            - Judge Layer（Two-stage Detection + Cross-Model Verification）
            - Skill / Plugin / Extension の3層拡張体系
            - 自然言語スキル生成（安全性チェック付き）
            - Dynamic Model Registry（コード変更なしにモデル入替可能）
            - ランタイム設定管理（CLI / Web UI / .env）
            - 壁打ち・マルチモデル比較・会話記憶
            - 承認フロー + 監査ログ

            ### 初回セットアップ / First Setup / 首次设置

            1. Assets からファイルをダウンロード / Download from Assets
            2. インストーラーを実行 / Run the installer
            3. アカウント登録（またはログインせずに開始）/ Register (or start without login)
            4. 設定画面で LLM API キーを入力 / Enter LLM API key in Settings
            5. ダッシュボードから自然言語で業務を依頼 / Request tasks in natural language

            ### CLI / TUI 版（エンジニア向け）

            ```bash
            pip install zero-employee-orchestrator
            # または / or
            uv pip install zero-employee-orchestrator
            ```

            > 詳細 / Details: [README](https://github.com/OrosiTororo/Zero-Employee-Orchestrator#readme) | [User Guide](https://github.com/OrosiTororo/Zero-Employee-Orchestrator/blob/master/docs/USER_GUIDE.md) | [CHANGELOG](https://github.com/OrosiTororo/Zero-Employee-Orchestrator/blob/master/docs/CHANGELOG.md)
          releaseDraft: true
          prerelease: false
