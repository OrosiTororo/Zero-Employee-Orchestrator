name: Release - Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # Build Tauri desktop app for all platforms
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: linux
          - platform: macos-latest
            target: macos
          - platform: windows-latest
            target: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: apps/desktop/ui
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          releaseName: "Zero-Employee Orchestrator ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}"
          releaseBody: |
            ## Zero-Employee Orchestrator ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}

            AI業務オーケストレーション基盤 / AI Business Orchestration Platform

            ---

            ### ダウンロード / Download / 下载

            下の **Assets** からお使いの OS に合ったファイルをクリックしてダウンロードしてください。
            Click the file matching your OS from **Assets** below.

            | OS | ファイル / File | 説明 / Description |
            |---|---|---|
            | **Windows** | `_x64_ja-JP.msi` | 日本語 Windows インストーラー |
            | **Windows** | `_x64_en-US.msi` | English Windows installer |
            | **Windows** | `_x64_zh-CN.msi` | 中文 Windows 安装程序 |
            | **Windows** | `_x64-setup.exe` | NSIS installer (if .msi doesn't work) |
            | **macOS** | `_universal.dmg` | macOS (Intel + Apple Silicon) |
            | **macOS** | `_aarch64.dmg` | macOS Apple Silicon only |
            | **Linux** | `_amd64.AppImage` | Portable (no install needed) |
            | **Linux** | `_amd64.deb` | Debian / Ubuntu |
            | **Linux** | `_x86_64.rpm` | Fedora / RHEL |

            ### 初回セットアップ / First Setup / 首次设置

            1. Assets からファイルをダウンロード / Download from Assets
            2. インストーラーを実行 / Run the installer
            3. アカウント登録（またはログインせずに開始）/ Register (or start without login)
            4. 設定画面で LLM API キーを入力 / Enter LLM API key in Settings
            5. ダッシュボードから自然言語で業務を依頼 / Request tasks in natural language

            > 📖 詳細: [README](https://github.com/TroroOrosi/Zero-Employee-Orchestrator#readme) | [User Guide](https://github.com/TroroOrosi/Zero-Employee-Orchestrator/blob/master/USER_GUIDE.md)
          releaseDraft: true
          prerelease: false
