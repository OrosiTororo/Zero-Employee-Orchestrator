name: Release - Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # Build Tauri desktop app for all platforms
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: linux
          - platform: macos-latest
            target: macos
          - platform: windows-latest
            target: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: npx tauri
          tagName: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          releaseName: "Zero-Employee Orchestrator ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}"
          releaseBody: |
            ## Zero-Employee Orchestrator ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}

            AI業務オーケストレーション基盤 / AI Business Orchestration Platform / AI业务编排平台

            自然言語で業務を定義し、複数 AI を役割分担させ、人間の承認と監査可能性を前提に業務を実行するプラットフォーム。

            ---

            ### ダウンロード / Download / 下载

            下の **Assets** からお使いの OS に合ったファイルをクリックしてダウンロードしてください。
            Click the file matching your OS from **Assets** below.
            请从下方 **Assets** 中点击与您操作系统匹配的文件进行下载。

            | OS | ファイル / File | 説明 / Description |
            |---|---|---|
            | **Windows** | `_x64_en-US.msi` | Windows installer (.msi) |
            | **Windows** | `_x64-setup.exe` | Windows installer (.exe / NSIS) |
            | **macOS** | `_aarch64.dmg` | macOS (Apple Silicon) |
            | **Linux** | `_amd64.AppImage` | Portable (no install needed) |
            | **Linux** | `_amd64.deb` | Debian / Ubuntu |
            | **Linux** | `_x86_64.rpm` | Fedora / RHEL |

            ### 主な機能 / Key Features

            - 9層アーキテクチャ（Design Interview〜Skill Registry）
            - Self-Healing DAG によるタスクオーケストレーション
            - Judge Layer（Two-stage Detection + Cross-Model Verification）
            - Skill / Plugin / Extension の3層拡張体系
            - Dynamic Model Registry（コード変更なしにモデル入替可能）
            - ランタイム設定管理（CLI / Web UI / .env）
            - 承認フロー + 監査ログ

            ### 初回セットアップ / First Setup / 首次设置

            1. Assets からファイルをダウンロード / Download from Assets
            2. インストーラーを実行 / Run the installer
            3. アカウント登録（またはログインせずに開始）/ Register (or start without login)
            4. 設定画面で LLM API キーを入力 / Enter LLM API key in Settings
            5. ダッシュボードから自然言語で業務を依頼 / Request tasks in natural language

            ### CLI / TUI 版（エンジニア向け）

            ```bash
            pip install zero-employee-orchestrator
            # または uv pip install zero-employee-orchestrator
            ```

            > 詳細: [README](https://github.com/OrosiTororo/Zero-Employee-Orchestrator#readme) | [User Guide](https://github.com/OrosiTororo/Zero-Employee-Orchestrator/blob/master/docs/USER_GUIDE.md) | [CHANGELOG](https://github.com/OrosiTororo/Zero-Employee-Orchestrator/blob/master/docs/CHANGELOG.md)
          releaseDraft: true
          prerelease: false
