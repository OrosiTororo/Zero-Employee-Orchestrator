name: Release - Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # Build Tauri desktop app for all platforms
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - platform: ubuntu-24.04
            target: linux
            rust_target: ''
          # macOS — universal binary (Intel + Apple Silicon)
          - platform: macos-latest
            target: macos
            rust_target: universal-apple-darwin
          # Windows — single installer; language selectable at runtime
          - platform: windows-latest
            target: windows
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets for universal macOS binary
        if: matrix.target == 'macos'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: npx tauri
          args: ${{ matrix.rust_target != '' && format('--target {0}', matrix.rust_target) || '' }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          releaseName: "Zero-Employee Orchestrator ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}"
          releaseBody: |
            AI Business Orchestration Platform. Define business workflows in natural language, orchestrate multiple AI agents with role-based delegation, and execute tasks with human approval and full auditability.

            ### Download

            Click the file matching your OS from **Assets** below. Language can be changed after installation via the setup wizard or Settings.

            | OS | File | Description |
            |---|---|---|
            | **Windows** | `.msi` | Windows installer ⭐ |
            | **Windows** | `-setup.exe` | Windows installer (NSIS) |
            | **macOS** | `.dmg` | macOS (Intel / Apple Silicon) ⭐ |
            | **Linux** | `.AppImage` | Portable (no install needed) ⭐ |
            | **Linux** | `.deb` | Debian / Ubuntu |
            | **Linux** | `.rpm` | Fedora / RHEL |

            ### Key Features

            - 9-layer architecture (Design Interview to Skill Registry)
            - Task orchestration via Self-Healing DAG
            - Judge Layer (Two-stage Detection + Cross-Model Verification)
            - 3-tier extension system: Skill / Plugin / Extension
            - Dynamic Model Registry (swap models without code changes)
            - Runtime config management (CLI / Web UI / .env)
            - Approval workflow + audit log
            - Multi-language support (English / 日本語 / 中文) — switchable at any time

            ### First Setup

            1. Download the file matching your OS from Assets
            2. Run the installer
            3. Choose your language in the setup wizard
            4. Enter your LLM API key in Settings (or use subscription mode — no key needed)
            5. Request tasks in natural language from the Dashboard

            ### CLI / TUI (for developers)

            ```bash
            pip install zero-employee-orchestrator
            zero-employee chat --lang en    # English (default)
            zero-employee chat --lang ja    # Japanese
            zero-employee chat --lang zh    # Chinese
            ```

            > Details: [README](https://github.com/OrosiTororo/Zero-Employee-Orchestrator#readme) | [User Guide](https://github.com/OrosiTororo/Zero-Employee-Orchestrator/blob/master/docs/USER_GUIDE.md) | [CHANGELOG](https://github.com/OrosiTororo/Zero-Employee-Orchestrator/blob/master/docs/CHANGELOG.md)
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
