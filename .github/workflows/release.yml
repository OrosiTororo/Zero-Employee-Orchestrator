name: Release - Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # Build Tauri desktop app for all platforms
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: linux
          - platform: macos-latest
            target: macos
          - platform: windows-latest
            target: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: apps/desktop/ui
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          releaseName: "Zero-Employee Orchestrator ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}"
          releaseBody: |
            ## Zero-Employee Orchestrator ${{ github.ref_name }}

            AI業務オーケストレーション基盤

            ### ダウンロード

            お使いのOSに合ったファイルをクリックしてダウンロードしてください：

            | OS | ファイル | 説明 |
            |---|---|---|
            | **Windows** | `.msi` | インストーラー（推奨） |
            | **Windows** | `.exe` | NSIS インストーラー |
            | **macOS** | `.dmg` | ディスクイメージ |
            | **Linux** | `.AppImage` | ポータブル実行ファイル |
            | **Linux** | `.deb` | Debian/Ubuntu パッケージ |

            ### 初回セットアップ
            1. 上の Assets からファイルをダウンロード
            2. ダウンロードしたファイルを実行してインストール
            3. アカウント登録（メールアドレスとパスワード）
            4. セットアップウィザードに従って設定
            5. ダッシュボードから自然言語で業務を依頼
          releaseDraft: true
          prerelease: false
