name: Release - Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # Build Tauri desktop app for all platforms
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - platform: ubuntu-24.04
            target: linux
            rust_target: ''
          # macOS — universal binary (Intel + Apple Silicon)
          - platform: macos-latest
            target: macos
            rust_target: universal-apple-darwin
          # Windows — single installer; language selectable at runtime
          - platform: windows-latest
            target: windows
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets for universal macOS binary
        if: matrix.target == 'macos'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Configure Linux AppImage build environment
        if: matrix.target == 'linux'
        run: |
          # linuxdeploy (used by Tauri to build AppImages) is itself an AppImage.
          # On ubuntu-24.04, FUSE 2 is not available, so we must use extract-and-run mode.
          # NO_STRIP prevents failures caused by modern .relr.dyn ELF sections in Ubuntu 24.04 glibc.
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"
          echo "NO_STRIP=true" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        # continue-on-error is required to work around tauri-action#1270:
        # in parallel matrix builds, concurrent jobs race to delete/re-upload
        # the shared latest.json in the release, causing 404 errors on the
        # deleteReleaseAsset call. The action writes latest.json to disk
        # (process.cwd()) BEFORE attempting the delete/upload, so the file
        # exists locally even when the upload fails. The fragment step below
        # copies it for the merge-updater-json job. If the build itself fails
        # (compilation error, no .sig files), latest.json is never written and
        # the fragment step exits 1 — correctly failing this job.
        continue-on-error: true
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: npx tauri
          args: ${{ matrix.rust_target != '' && format('--target {0}', matrix.rust_target) || '' }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          releaseName: "${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}"
          releaseBody: |
            AI Business Orchestration Platform. Define business workflows in natural language, orchestrate multiple AI agents with role-based delegation, and execute tasks with human approval and full auditability.

            ### Download

            Download the file for your OS from **Assets** below. The installer will ask you to choose a language first.

            | OS | File | Notes |
            |---|---|---|
            | **Windows** | `-setup.exe` | Language selection at install ⭐ |
            | **macOS** | `.dmg` | Intel / Apple Silicon ⭐ |
            | **Linux** | `.AppImage` | Portable, no install needed ⭐ |
            | **Linux** | `.deb` | Debian / Ubuntu |
            | **Linux** | `.rpm` | Fedora / RHEL |
            | **Chrome** | `chrome-extension.zip` | Load unpacked in chrome://extensions |

            ### Key Features

            - 9-layer architecture (Design Interview to Skill Registry)
            - Task orchestration via Self-Healing DAG
            - Judge Layer (Two-stage Detection + Cross-Model Verification)
            - 3-tier extension system: Skill / Plugin / Extension
            - Dynamic Model Registry (swap models without code changes)
            - Runtime config management (CLI / Web UI / .env)
            - Approval workflow + audit log
            - Multi-language support (English / 日本語 / 中文) — switchable at any time

            ### First Setup

            1. Download the file matching your OS from Assets
            2. Run the installer
            3. Choose your language in the setup wizard
            4. Enter your LLM API key in Settings (or use subscription mode — no key needed)
            5. Request tasks in natural language from the Dashboard

            ### CLI / TUI (for developers)

            ```bash
            pip install zero-employee-orchestrator
            zero-employee chat --lang en    # English (default)
            zero-employee chat --lang ja    # Japanese
            zero-employee chat --lang zh    # Chinese
            ```

            > Details: [README](https://github.com/OrosiTororo/Zero-Employee-Orchestrator#readme) | [User Guide](https://github.com/OrosiTororo/Zero-Employee-Orchestrator/blob/master/docs/USER_GUIDE.md) | [CHANGELOG](https://github.com/OrosiTororo/Zero-Employee-Orchestrator/blob/master/docs/CHANGELOG.md)
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Upload per-platform updater JSON fragment
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}"
          # Save a copy of the platform-specific latest.json for the merge job
          # Check target-specific path first (e.g. universal-apple-darwin), then default release path
          RUST_TARGET="${{ matrix.rust_target }}"
          if [ -n "$RUST_TARGET" ] && [ -f "apps/desktop/src-tauri/target/${RUST_TARGET}/release/bundle/updater/latest.json" ]; then
            cp "apps/desktop/src-tauri/target/${RUST_TARGET}/release/bundle/updater/latest.json" latest-${{ matrix.target }}.json
          elif [ -f apps/desktop/src-tauri/target/release/bundle/updater/latest.json ]; then
            cp apps/desktop/src-tauri/target/release/bundle/updater/latest.json latest-${{ matrix.target }}.json
          elif [ -f latest.json ]; then
            cp latest.json latest-${{ matrix.target }}.json
          fi

          if [ ! -f "latest-${{ matrix.target }}.json" ]; then
            echo "::error::Failed to find updater JSON for ${{ matrix.target }}"
            exit 1
          fi

      - name: Upload updater fragment artifact
        uses: actions/upload-artifact@v7
        with:
          name: updater-${{ matrix.target }}
          path: latest-${{ matrix.target }}.json
          if-no-files-found: error

  # Package and upload Chrome extension (Browser Assist)
  build-chrome-extension:
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Package Chrome extension
        run: |
          cd extensions/browser-assist/chrome-extension
          # Update version in manifest to match release tag
          TAG="${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}"
          VERSION="${TAG#v}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          cd ..
          zip -r chrome-extension.zip chrome-extension/
          echo "Packaged Chrome extension v${VERSION}"

      - name: Upload Chrome extension to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}"
          gh release upload "${TAG}" extensions/browser-assist/chrome-extension.zip \
            --clobber \
            --repo "${GH_REPO}"
          echo "Uploaded chrome-extension.zip to release ${TAG}"

  # Merge latest.json fragments from all platforms to prevent race conditions
  merge-updater-json:
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Download all updater fragments
        uses: actions/download-artifact@v8
        with:
          pattern: updater-*
          merge-multiple: true

      - name: Merge platform entries into latest.json
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}"

          # Merge all fragment files into a single latest.json
          MERGED="{}"
          for f in latest-*.json; do
            [ -f "$f" ] || continue
            echo "Merging $f ..."
            MERGED=$(echo "$MERGED" | jq -s '.[0] as $base | .[1] | {
              version: .version,
              notes: .notes,
              pub_date: .pub_date,
              platforms: (($base.platforms // {} | to_entries) + (.platforms // {} | to_entries) | from_entries)
            }' - "$f")
          done

          echo "$MERGED" | jq . > latest.json
          echo "=== Merged latest.json ==="
          jq '.platforms | keys' latest.json

          # Verify platforms object is non-empty
          PLATFORM_COUNT=$(jq '.platforms | length' latest.json)
          if [ "$PLATFORM_COUNT" -eq 0 ]; then
            echo "::error::latest.json has no platforms defined"
            exit 1
          fi

          # Verify all expected platforms are present
          PLATFORMS=$(jq -r '.platforms | keys[]' latest.json)
          HAS_LINUX=false; HAS_WINDOWS=false; HAS_MACOS=false
          for p in $PLATFORMS; do
            case "$p" in
              linux-*) HAS_LINUX=true ;;
              windows-*) HAS_WINDOWS=true ;;
              darwin-*) HAS_MACOS=true ;;
            esac
          done
          echo "Linux: $HAS_LINUX, Windows: $HAS_WINDOWS, macOS: $HAS_MACOS"
          if [ "$HAS_LINUX" = false ] || [ "$HAS_WINDOWS" = false ] || [ "$HAS_MACOS" = false ]; then
            echo "::error::Missing platform entries in latest.json (Linux=$HAS_LINUX, Windows=$HAS_WINDOWS, macOS=$HAS_MACOS)"
            exit 1
          fi

      - name: Upload merged latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}"

          # Delete old latest.json asset if exists
          ASSET_ID=$(gh api "repos/${GH_REPO}/releases/tags/${TAG}" \
            --jq '.assets[] | select(.name == "latest.json") | .id' 2>/dev/null || true)
          if [ -n "$ASSET_ID" ]; then
            gh api -X DELETE "repos/${GH_REPO}/releases/assets/${ASSET_ID}"
            echo "Deleted old latest.json (asset $ASSET_ID)"
          fi

          # Upload merged latest.json
          RELEASE_ID=$(gh api "repos/${GH_REPO}/releases/tags/${TAG}" --jq '.id')
          gh api \
            -X POST \
            -H "Content-Type: application/json" \
            "https://uploads.github.com/repos/${GH_REPO}/releases/${RELEASE_ID}/assets?name=latest.json" \
            --input latest.json
          echo "Uploaded merged latest.json to release ${TAG}"
