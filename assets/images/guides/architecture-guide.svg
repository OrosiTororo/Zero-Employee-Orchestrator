<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6d28d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" rx="24" fill="#0f172a"/>
  <rect width="1200" height="630" rx="24" fill="url(#bg)" opacity="0.12"/>

  <!-- 9-layer visualization -->
  <g transform="translate(600, 200)" filter="url(#glow)">
    <!-- Layer blocks -->
    <rect x="-120" y="-90" width="240" height="20" rx="4" fill="#a78bfa" opacity="0.15"/>
    <rect x="-110" y="-65" width="220" height="20" rx="4" fill="#a78bfa" opacity="0.2"/>
    <rect x="-100" y="-40" width="200" height="20" rx="4" fill="#a78bfa" opacity="0.25"/>
    <rect x="-90" y="-15" width="180" height="20" rx="4" fill="#a78bfa" opacity="0.3"/>
    <rect x="-80" y="10" width="160" height="20" rx="4" fill="#a78bfa" opacity="0.35"/>
    <rect x="-70" y="35" width="140" height="20" rx="4" fill="#a78bfa" opacity="0.4"/>
    <rect x="-60" y="60" width="120" height="20" rx="4" fill="#a78bfa" opacity="0.45"/>
    <rect x="-50" y="85" width="100" height="20" rx="4" fill="#a78bfa" opacity="0.5"/>
    <rect x="-40" y="110" width="80" height="20" rx="4" fill="#a78bfa" opacity="0.55"/>

    <!-- Connection lines -->
    <line x1="0" y1="-70" x2="0" y2="110" stroke="#c4b5fd" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

    <!-- Nodes -->
    <circle cx="-130" cy="-80" r="6" fill="#a78bfa"/>
    <circle cx="130" cy="-80" r="6" fill="#c4b5fd"/>
    <circle cx="-100" cy="20" r="6" fill="#a78bfa"/>
    <circle cx="100" cy="20" r="6" fill="#c4b5fd"/>
    <circle cx="-50" cy="120" r="6" fill="#a78bfa"/>
    <circle cx="50" cy="120" r="6" fill="#c4b5fd"/>

    <!-- Connection arcs -->
    <line x1="-130" y1="-80" x2="-120" y2="-80" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
    <line x1="120" y1="-80" x2="130" y2="-80" stroke="#c4b5fd" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ZEO badge -->
  <rect x="520" y="100" width="160" height="36" rx="18" fill="#7c3aed" opacity="0.3"/>
  <text x="600" y="124" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" fill="#c4b5fd" text-anchor="middle" font-weight="600">ZEO GUIDES</text>

  <!-- Title -->
  <text x="600" y="390" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="56" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2">Architecture Deep Dive</text>

  <!-- Subtitle -->
  <text x="600" y="440" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle">9-layer architecture, DAG orchestration, Judge Layer, Experience Memory</text>

  <!-- Layer count badge -->
  <g transform="translate(520, 490)">
    <rect x="0" y="0" width="160" height="32" rx="16" fill="#7c3aed" opacity="0.2"/>
    <text x="80" y="21" font-family="'SF Mono', monospace" font-size="13" fill="#a78bfa" text-anchor="middle">9 Layers</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="100" cy="80" r="3" fill="#7c3aed" opacity="0.4"/>
  <circle cx="130" cy="60" r="2" fill="#6d28d9" opacity="0.3"/>
  <circle cx="80" cy="100" r="1.5" fill="#4c1d95" opacity="0.5"/>
  <circle cx="1100" cy="550" r="3" fill="#a78bfa" opacity="0.4"/>
  <circle cx="1120" cy="530" r="2" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="1080" cy="560" r="1.5" fill="#a78bfa" opacity="0.5"/>
</svg>
