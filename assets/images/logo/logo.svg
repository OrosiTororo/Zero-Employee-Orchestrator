<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect x="0" y="0" width="720" height="240" rx="20" ry="20" fill="#0f0f23"/>

  <!-- Hexagonal icon -->
  <g transform="translate(90, 120)" filter="url(#glow)">
    <!-- Outer hexagon -->
    <polygon points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26" fill="none" stroke="url(#grad1)" stroke-width="3"/>
    <!-- Inner hexagon -->
    <polygon points="0,-32 28,-16 28,16 0,32 -28,16 -28,-16" fill="url(#grad1)" opacity="0.15"/>
    <!-- Center node -->
    <circle cx="0" cy="0" r="8" fill="url(#grad1)"/>
    <!-- Orbital nodes -->
    <circle cx="0" cy="-28" r="5" fill="#818cf8"/>
    <circle cx="24" cy="14" r="5" fill="#a78bfa"/>
    <circle cx="-24" cy="14" r="5" fill="#c4b5fd"/>
    <!-- Connection lines -->
    <line x1="0" y1="-8" x2="0" y2="-23" stroke="#818cf8" stroke-width="1.5" opacity="0.7"/>
    <line x1="7" y1="4" x2="19" y2="11" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
    <line x1="-7" y1="4" x2="-19" y2="11" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- ZEO text -->
  <text x="160" y="105" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="64" font-weight="800" fill="url(#grad1)" letter-spacing="6">ZEO</text>

  <!-- Full name -->
  <text x="160" y="145" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="22" font-weight="500" fill="#e2e8f0" letter-spacing="3">ZERO-EMPLOYEE ORCHESTRATOR</text>

  <!-- Tagline -->
  <text x="160" y="178" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="13" fill="#94a3b8" letter-spacing="1">AI Orchestration Platform — Design · Execute · Verify · Improve</text>

  <!-- Version badge -->
  <rect x="160" y="192" width="52" height="20" rx="10" fill="#6366f1" opacity="0.2"/>
  <text x="171" y="206" font-family="'SF Mono', monospace" font-size="11" fill="#a78bfa">v0.1</text>

  <!-- Decorative dots -->
  <circle cx="660" cy="40" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="680" cy="55" r="1.5" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="650" cy="60" r="1" fill="#a78bfa" opacity="0.5"/>
  <circle cx="670" cy="30" r="1" fill="#c4b5fd" opacity="0.3"/>
</svg>
